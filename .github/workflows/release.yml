name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        env:
          OAuthClientId: ${{ secrets.YTPT_CLIENT_ID }}
          OAuthClientSecret: ${{ secrets.YTPT_CLIENT_SECRET }}
        run: >
          dotnet publish src/YTPlaylistTracker.UI -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:OAuthClientId=$OAuthClientId
          -p:OAuthClientSecret=$OAuthClientSecret
          -o publish/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv YTPlaylistTracker.UI.exe ytpt.exe
            7z a ../../ytpt-${{ matrix.rid }}.zip ytpt.exe
          else
            mv YTPlaylistTracker.UI ytpt
            chmod +x ytpt
            tar czf ../../ytpt-${{ matrix.rid }}.tar.gz ytpt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytpt-${{ matrix.rid }}
          path: ytpt-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: scripts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Find previous tag
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          echo "Generating changelog for ${RANGE}..."

          # Collect commits by type
          FEATS=$(git log --pretty=format:'- %s' "$RANGE" --grep='^feat' 2>/dev/null | sed 's/^- feat[^:]*: /- /')
          FIXES=$(git log --pretty=format:'- %s' "$RANGE" --grep='^fix' 2>/dev/null | sed 's/^- fix[^:]*: /- /')
          OTHER=$(git log --pretty=format:'- %s' "$RANGE" --grep -v -E '^(feat|fix)' 2>/dev/null | head -20)

          # Build body
          BODY="## What's Changed"
          BODY="${BODY}\n"
          if [ -n "$FEATS" ]; then
            BODY="${BODY}\n### Features\n${FEATS}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}\n### Bug Fixes\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}\n### Other\n${OTHER}\n"
          fi

          # Install instructions
          BODY="${BODY}\n---\n"
          BODY="${BODY}\n## Install\n"
          BODY="${BODY}\n**Linux / macOS:**\n\`\`\`bash\ncurl -fsSL https://raw.githubusercontent.com/7KiLL/YTPlaylistTracker/main/scripts/install.sh | bash\n\`\`\`\n"
          BODY="${BODY}\n**Windows (PowerShell):**\n\`\`\`powershell\nirm https://raw.githubusercontent.com/7KiLL/YTPlaylistTracker/main/scripts/install.ps1 | iex\n\`\`\`\n"

          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}\n**Full Changelog**: https://github.com/7KiLL/YTPlaylistTracker/compare/${PREV_TAG}...${CURRENT_TAG}"
          fi

          # Write to file (multiline-safe)
          echo -e "$BODY" > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            artifacts/*
            scripts/install.sh
            scripts/install.ps1
