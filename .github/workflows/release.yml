name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        env:
          OAuthClientId: ${{ secrets.YTPT_CLIENT_ID }}
          OAuthClientSecret: ${{ secrets.YTPT_CLIENT_SECRET }}
        run: >
          dotnet publish src/YTPlaylistTracker.UI -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:OAuthClientId=$OAuthClientId
          -p:OAuthClientSecret=$OAuthClientSecret
          -o publish/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv YTPlaylistTracker.UI.exe ytpt.exe
            7z a ../../ytpt-${{ matrix.rid }}.zip ytpt.exe
          else
            mv YTPlaylistTracker.UI ytpt
            chmod +x ytpt
            tar czf ../../ytpt-${{ matrix.rid }}.tar.gz ytpt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytpt-${{ matrix.rid }}
          path: ytpt-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/*
            scripts/install.sh
            scripts/install.ps1
