name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        shell: bash
        env:
          OAuthClientId: ${{ secrets.YTPT_CLIENT_ID }}
          OAuthClientSecret: ${{ secrets.YTPT_CLIENT_SECRET }}
        run: >
          dotnet publish src/YTPlaylistTracker.UI -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:OAuthClientId=$OAuthClientId
          -p:OAuthClientSecret=$OAuthClientSecret
          -o publish/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv YTPlaylistTracker.UI.exe ytpt.exe
            7z a ../../ytpt-${{ matrix.rid }}.zip ytpt.exe
          else
            mv YTPlaylistTracker.UI ytpt
            chmod +x ytpt
            tar czf ../../ytpt-${{ matrix.rid }}.tar.gz ytpt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ytpt-${{ matrix.rid }}
          path: ytpt-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          GC_VERSION="2.12.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1 git-cliff-${GC_VERSION}/git-cliff
          ./git-cliff --config cliff.toml --latest --strip header -o CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/*
